name = "greenlock"
main = "src/worker.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = "./public"

# KV namespace for storing certificate data and auto-renewal schedules
[[kv_namespaces]]
binding = "SSL_STORE"
id = "1a1fe7a4e0554c90bd83a73517ce39bd"

# Cron trigger for auto-renewal (runs daily at 2:00 AM UTC)
[triggers]
crons = ["0 2 * * *"]

# Secrets (set via Cloudflare dashboard > Workers > Settings > Variables and Secrets):
# EAB_KID          - ZeroSSL EAB Key ID
# EAB_HMAC_KEY     - ZeroSSL EAB HMAC Key
# CF_API_TOKEN     - Cloudflare API token (Zone:DNS:Edit) for auto-renewal DNS management
# ACME_ENGINE_URL  -  backend URL 
#                    When set, ACME requests are proxied through Railway to avoid HTTP 525 errors.
# ENGINE_TOKEN     - Shared secret between Worker and Railway ACME engine.
