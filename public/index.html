<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Free SSL Certificate Generator</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial;
background:#f8fafc;
color:#111;
line-height:1.6;
}

.container{
max-width:1100px;
margin:auto;
padding:40px 20px;
}

header{
background:#fff;
border-bottom:1px solid #e5e7eb;
}

.header-inner{
max-width:1100px;
margin:auto;
padding:16px 20px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
height:34px;
}

.lang{
display:flex;
gap:10px;
}

.lang button{
border:none;
background:#f3f4f6;
padding:6px 12px;
border-radius:6px;
cursor:pointer;
font-size:14px;
}

.hero{
text-align:center;
padding:60px 20px 30px;
}

.hero h1{
font-size:40px;
font-weight:700;
margin-bottom:10px;
}

.hero p{
color:#6b7280;
font-size:18px;
}

.card{
background:#fff;
border-radius:14px;
padding:32px;
margin-top:30px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

.form-group{
margin-bottom:20px;
}

.form-group label{
display:block;
margin-bottom:6px;
font-weight:600;
font-size:14px;
}

input,select{
width:100%;
padding:12px;
border:1px solid #d1d5db;
border-radius:8px;
font-size:15px;
}

input:focus{
outline:none;
border-color:#2563eb;
}

.row{
display:flex;
gap:12px;
}

.btn{
background:#000;
color:#fff;
border:none;
padding:14px;
border-radius:10px;
cursor:pointer;
font-weight:600;
font-size:15px;
width:100%;
}

.btn:hover{
background:#1f2937;
}

.stepbar{
display:flex;
justify-content:center;
gap:20px;
margin-top:30px;
font-size:14px;
}

.step{
padding:6px 14px;
border-radius:20px;
background:#e5e7eb;
}

.step.active{
background:#000;
color:#fff;
}

.challenge-card{
border:1px solid #e5e7eb;
border-radius:12px;
padding:20px;
margin-top:20px;
}

.challenge-title{
font-weight:700;
margin-bottom:10px;
}

.field{
display:flex;
margin-top:8px;
}

.field input{
flex:1;
font-family:monospace;
}

.copy{
margin-left:6px;
background:#f3f4f6;
border:none;
padding:6px 12px;
border-radius:6px;
cursor:pointer;
}

.verify{
margin-top:20px;
}

textarea{
width:100%;
height:160px;
border-radius:10px;
border:1px solid #d1d5db;
padding:12px;
font-family:monospace;
}

.downloads{
display:flex;
gap:10px;
margin-top:10px;
flex-wrap:wrap;
}

.downloads button{
background:#2563eb;
color:#fff;
border:none;
padding:10px 16px;
border-radius:8px;
cursor:pointer;
}

.footer{
text-align:center;
margin-top:50px;
color:#6b7280;
font-size:13px;
}

@media(max-width:700px){

.hero h1{
font-size:28px;
}

.row{
flex-direction:column;
}

}

</style>
</head>

<body>

<header>

<div class="header-inner">

<img src="https://static.zebrabyte.ro/web/image/3839-d356d2ee/logo-zebra-white.webp"
class="logo">

<div class="lang">
<button>RO</button>
<button>EN</button>
</div>

</div>

</header>

<div class="hero">

<h1>Free SSL Certificate Generator</h1>

<p>Generate trusted SSL certificates in seconds using ACME.</p>

</div>

<div class="container">

<div class="stepbar">

<div class="step active">Generate</div>

<div class="step">Verify</div>

<div class="step">Download</div>

</div>

<div class="card">

<form id="order-form">

<div class="form-group">

<label>Domain name</label>

<input id="domains" placeholder="example.com">

</div>

<div class="form-group">

<label>Email</label>

<input id="email" placeholder="email@example.com">

</div>

<div class="row">

<div class="form-group">

<label>Certificate Authority</label>

<select name="ca">

<option value="letsencrypt">Let's Encrypt</option>

<option value="zerossl">ZeroSSL</option>

</select>

</div>

<div class="form-group">

<label>Verification</label>

<select name="challengeType">

<option value="http-01">HTTP</option>

<option value="dns-01">DNS</option>

</select>

</div>

</div>

<button class="btn">Create Certificate</button>

</form>

</div>

<div id="challenge-area"></div>

<div id="verify-area" class="verify"></div>

<div id="cert-area" class="card" style="display:none">

<h2>Certificate Ready</h2>

<div class="downloads">

<button onclick="downloadFile('cert')">Download CRT</button>

<button onclick="downloadFile('key')">Download KEY</button>

<button onclick="downloadFile('chain')">Download Bundle</button>

</div>

<label>Certificate</label>

<textarea id="cert-output"></textarea>

<label>Private Key</label>

<textarea id="key-output"></textarea>

<label>CA Bundle</label>

<textarea id="chain-output"></textarea>

</div>

</div>

<div class="footer">

Powered by Let's Encrypt & ZeroSSL

</div>

</body>

</html>
